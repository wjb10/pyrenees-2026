<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toulouse → Pyrénées → Ordesa → Pays Basque · 27 Jun – 6 Jul 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23201b; --muted:#6b6358; --bg:#f6f2ea; --card:#fffdf8;
    --green:#187247; --green-soft:#e4ece4; --trail:#6f42c1; --ochre:#d26a2a; --ochre-soft:#f3e2d4;
    --red:#b4235b; --slate:#2f6f9f; --line:#e4ddd0; --shadow:0 1px 2px rgba(40,30,15,.05),0 8px 24px rgba(40,30,15,.06);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:600;line-height:1.12;letter-spacing:-.01em;margin:0}
  a{color:var(--ochre);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}

  header.hero{background:linear-gradient(160deg,#2f4636,#3c5a44 60%,#4a6b51);color:#f6f2ea;padding:54px 0 30px}
  .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#bcd0bf;margin-bottom:14px}
  header.hero h1{color:#fff;font-size:clamp(30px,5vw,52px);font-weight:600}
  header.hero h1 .arr{color:#e9b890;font-weight:400}
  .tag{margin-top:14px;max-width:700px;color:#dce6dc;font-size:17px}
  .stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
  .stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:9px 14px;font-size:14px}
  .stat b{font-family:"Fraunces",serif;font-size:18px;font-weight:600;margin-right:6px;color:#fff}
  .tdf{margin-top:20px;background:rgba(233,184,144,.14);border:1px solid rgba(233,184,144,.4);border-radius:10px;padding:12px 15px;font-size:14px;color:#f2ddca;max-width:730px}
  .tdf b{color:#fff}

  nav{position:sticky;top:0;z-index:1000;background:rgba(246,242,234,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  nav .wrap{display:flex;gap:4px;overflow-x:auto;padding:0 22px}
  nav a{color:var(--muted);font-size:14px;font-weight:500;padding:14px 14px;white-space:nowrap;border-bottom:2px solid transparent}
  nav a:hover{color:var(--ink);text-decoration:none}

  section{padding:46px 0 8px}
  section > .wrap > h2{font-size:clamp(23px,3.2vw,32px);margin-bottom:6px}
  .lead{color:var(--muted);max-width:700px;margin-bottom:22px}

  #route-map{height:520px;border-radius:14px;border:1px solid var(--line);box-shadow:var(--shadow);background:#dfe6e8}
  .maprow{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-top:14px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:13px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:13px;height:13px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.18)}
  .dot.night{border-radius:50% 50% 50% 3px;transform:rotate(-45deg)}
  .dot.trail{box-shadow:0 0 0 1px rgba(0,0,0,.18),inset 0 0 0 2px rgba(255,255,255,.7)}
  .dot.mountain{clip-path:polygon(50% 4%,96% 96%,4% 96%);border-radius:2px}
  .dot.town{border-radius:3px}
  .dot.food{border-radius:50% 50% 50% 3px;transform:rotate(45deg)}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;padding:11px 17px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer}
  .btn:hover{background:#26382b;text-decoration:none}
  .btn.alt{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .btn.alt:hover{background:#fff}

  .day{background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
  .day > summary{list-style:none;cursor:pointer;padding:17px 20px;display:flex;gap:16px;align-items:baseline;flex-wrap:wrap}
  .day > summary::-webkit-details-marker{display:none}
  .daynum{font-family:"Fraunces",serif;font-size:13px;font-weight:600;color:#fff;background:var(--ochre);border-radius:7px;padding:3px 9px;flex:none}
  .dt{font-size:13px;color:var(--muted);font-weight:500;flex:none}
  .dttl{font-family:"Fraunces",serif;font-size:19px;font-weight:600;flex:1 1 240px;min-width:200px}
  .sleeppill{font-size:12.5px;color:var(--green);background:var(--green-soft);border-radius:20px;padding:4px 12px;font-weight:600;flex:none}
  .chev{flex:none;color:var(--muted);transition:transform .2s;font-size:13px}
  .day[open] .chev{transform:rotate(180deg)}
  .daybody{padding:2px 20px 20px;border-top:1px solid var(--line);margin-top:2px}
  .drive{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--slate);background:#eef2f4;border-radius:9px;padding:9px 13px;margin:15px 0;flex-wrap:wrap}
  .drive b{color:var(--ink)}
  .bits{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:640px){.bits{grid-template-columns:1fr 1fr}}
  .bit h4{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ochre);margin:0 0 5px}
  .bit p{margin:0;font-size:14.5px}
  .daylinks{margin-top:15px;display:flex;flex-wrap:wrap;gap:8px}
  .tlink{font-size:12.5px;padding:5px 11px;border:1px solid var(--line);border-radius:8px;color:var(--slate);background:#fff}
  .tlink:hover{border-color:var(--ochre);color:var(--ochre);text-decoration:none}

  .stays{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:760px){.stays{grid-template-columns:1fr 1fr}}
  .stay{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 20px;box-shadow:var(--shadow)}
  .stay.hl{border-color:var(--ochre);box-shadow:0 0 0 1px var(--ochre),var(--shadow)}
  .stay .nb{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:3px}
  .stay h3{font-size:20px}
  .stay .when{font-size:12.5px;color:var(--muted);font-weight:500;white-space:nowrap}
  .stay .nights{font-size:12px;color:var(--ochre);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .stay p{margin:0 0 8px;font-size:14.5px}
  .stay .pick{font-size:14px}
  .stay .pick b{color:var(--green)}
  .firstnote{background:var(--ochre-soft);border:1px solid #e7cbb3;border-radius:10px;padding:7px 12px;font-size:13px;margin-top:10px}

  .cols{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:760px){.cols{grid-template-columns:1fr 1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:20px 22px;box-shadow:var(--shadow)}
  .panel h3{font-size:18px;margin-bottom:10px}
  .panel ul{margin:0;padding-left:18px}
  .panel li{font-size:14px;margin-bottom:7px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
  .tg{font-size:12.5px;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:4px 11px;color:var(--muted)}
